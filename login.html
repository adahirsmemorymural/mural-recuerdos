<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>
<body>

<h1>Iniciar Sesión</h1>

<button id="loginBtn">
Entrar con Google
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHwHssU3NWZHA1cfB5ymYaHI4oYCgKnvk",
  authDomain: "mural-de-recuerdos.firebaseapp.com",
  projectId: "mural-de-recuerdos",
  storageBucket: "mural-de-recuerdos.firebasestorage.app",
  messagingSenderId: "497026178089",
  appId: "1:497026178089:web:58aa3e8f373ce8f8199038"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

document
.getElementById("loginBtn")
.addEventListener("click", async () => {

try {

const result =
await signInWithPopup(
auth,
provider
);

alert(
"Bienvenido " +
result.user.email
);

}
catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
