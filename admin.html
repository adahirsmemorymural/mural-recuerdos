<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Panel Administrador
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<h1>
📸 Adahir's Memory Mural
</h1>

<p>
Panel de Administración
</p>

</header>

<div class="admin-container">

<div class="admin-card">

<h2>
Nuevo Recuerdo
</h2>

<input
type="file"
id="photo">

<input
type="date"
id="date">

<input
type="text"
id="place"
placeholder="Lugar">

<textarea
id="description"
placeholder="Descripción">
</textarea>

<button
id="uploadBtn"
class="primary-btn">

Guardar Recuerdo

</button>

</div>

<div id="adminGallery">

</div>

</div>

<script
type="module"
src="admin.js">
</script>

</body>

</html>
